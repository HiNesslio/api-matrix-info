<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="title">API Matrix &middot; Secure Key Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f4ef;
      --surface: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6a66;
      --text-tertiary: #9c9b97;
      --accent: #1a3a6b;
      --accent-light: rgba(26, 58, 107, 0.06);
      --accent-border: rgba(26, 58, 107, 0.12);
      --border: rgba(0, 0, 0, 0.06);
      --radius: 10px;
      --font-display: 'Bricolage Grotesque', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      position: relative;
    }

    /* decorative M mark */
    .mark {
      position: fixed;
      right: -40px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 0;
      pointer-events: none;
      user-select: none;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(300px, 40vw, 640px);
      line-height: 1;
      color: rgba(26, 58, 107, 0.035);
      letter-spacing: -0.06em;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      padding: 48px 40px;
      margin: 0 auto 0 10vw;
      opacity: 0;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .lang-toggle {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px;
      width: fit-content;
      margin-bottom: 56px;
      opacity: 0;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }
    .lang-toggle button {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .lang-toggle button.active {
      background: var(--accent-light);
      color: var(--accent);
    }
    .lang-toggle button:not(.active):hover {
      color: var(--text-primary);
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      opacity: 0;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }
    .eyebrow-diamond {
      width: 8px;
      height: 8px;
      background: var(--accent);
      transform: rotate(45deg);
      border-radius: 1.5px;
      flex-shrink: 0;
    }
    .eyebrow-label {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(40px, 7vw, 60px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-bottom: 20px;
      opacity: 0;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }
    h1 .accent {
      color: var(--accent);
    }

    .divider {
      width: 36px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      margin-bottom: 24px;
      opacity: 0;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    .tagline {
      font-size: 16px;
      line-height: 1.75;
      color: var(--text-secondary);
      max-width: 440px;
      margin-bottom: 40px;
      opacity: 0;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 36px;
      opacity: 0;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-body);
      transition: all 0.25s ease;
    }
    .links a:hover {
      border-color: var(--accent-border);
      background: var(--accent-light);
    }
    .links a:active {
      transform: scale(0.97);
    }
    .links a .arrow {
      font-size: 16px;
      color: var(--text-tertiary);
      transition: transform 0.25s ease;
    }
    .links a:hover .arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      opacity: 0;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }
    .badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 6px 12px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .badge--accent {
      background: var(--accent-light);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    footer {
      margin-top: 56px;
      font-size: 12px;
      color: var(--text-tertiary);
      opacity: 0;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      body { align-items: flex-start; padding-top: 48px; }
      .container { margin: 0 auto; padding: 0 24px; }
      .mark { display: none; }
      .lang-toggle { margin-bottom: 40px; }
      h1 { font-size: 34px; }
      .tagline { font-size: 15px; }
      footer { margin-top: 40px; }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141312;
        --surface: #1c1b1a;
        --text-primary: #e8e6e1;
        --text-secondary: #9c9a94;
        --text-tertiary: #6b6a66;
        --accent: #7a9fd4;
        --accent-light: rgba(122, 159, 212, 0.1);
        --accent-border: rgba(122, 159, 212, 0.2);
        --border: rgba(255, 255, 255, 0.06);
      }
      .mark { color: rgba(122, 159, 212, 0.04); }
    }

    @media (prefers-reduced-motion: reduce) {
      .container, .lang-toggle, .eyebrow, h1, .divider, .tagline, .links, .badges, footer {
        opacity: 1;
        animation: none;
      }
    }
  </style>
</head>
<body>

  <div class="mark" aria-hidden="true">M</div>

  <div class="container">
    <div class="lang-toggle" role="group" aria-label="Language switch">
      <button data-lang="en" class="active" aria-label="English">EN</button>
      <button data-lang="zh" aria-label="中文">中</button>
    </div>

    <div class="eyebrow">
      <div class="eyebrow-diamond" aria-hidden="true"></div>
      <span class="eyebrow-label" data-i18n="eyebrow">Secure Key Vault</span>
    </div>

    <h1>API <span class="accent">Matrix</span></h1>

    <div class="divider" aria-hidden="true"></div>

    <p class="tagline" data-i18n="tagline">
      Centrally manage, test, and track all your AI provider API keys.<br>
      100% local storage, biometric-locked.
    </p>

    <nav class="links">
      <a href="privacy.html">
        <span data-i18n="linkPrivacy">Privacy Policy</span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>
      <a href="support.html">
        <span data-i18n="linkSupport">Support &amp; FAQ</span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>
    </nav>

    <div class="badges">
      <span class="badge badge--accent" data-i18n="badgeBiometric">Biometric Lock</span>
      <span class="badge" data-i18n="badgePlatforms">iOS + Android</span>
      <span class="badge" data-i18n="badgeProviders">20+ Providers</span>
      <span class="badge badge--accent" data-i18n="badgeLocal">Local Only</span>
    </div>

    <footer>
      <span data-i18n="footer">&copy; 2026 API Matrix. All rights reserved.</span>
    </footer>
  </div>

  <script>
    const i18n = {
      en: {
        title: 'API Matrix \u00B7 Secure Key Vault',
        eyebrow: 'Secure Key Vault',
        tagline: 'Centrally manage, test, and track all your AI provider API keys.<br>100% local storage, biometric-locked.',
        linkPrivacy: 'Privacy Policy',
        linkSupport: 'Support &amp; FAQ',
        badgeBiometric: 'Biometric Lock',
        badgePlatforms: 'iOS + Android',
        badgeProviders: '20+ Providers',
        badgeLocal: 'Local Only',
        footer: '\u00A9 2026 API Matrix. All rights reserved.'
      },
      zh: {
        title: 'API Matrix \u00B7 \u5B89\u5168\u91D1\u9470\u4FDD\u7BA1\u5EAB',
        eyebrow: '\u5B89\u5168\u91D1\u9470\u4FDD\u7BA1\u5EAB',
        tagline: '\u96C6\u4E2D\u7BA1\u7406\u3001\u6E2C\u8A66\u548C\u8FFD\u8E64\u6240\u6709 AI \u4F9B\u61C9\u5546\u7684 API \u91D1\u9470\u3002<br>100% \u672C\u5730\u5132\u5B58\uFF0C\u751F\u7269\u8FA8\u8B58\u9396\u5B9A\u3002',
        linkPrivacy: '\u96B1\u79C1\u6B0A\u653F\u7B56',
        linkSupport: '\u652F\u63F4\u8207\u5E38\u898B\u554F\u984C',
        badgeBiometric: '\u751F\u7269\u8FA8\u8B58\u9396\u5B9A',
        badgePlatforms: 'iOS + Android',
        badgeProviders: '20+ \u4F9B\u61C9\u5546',
        badgeLocal: '\u50C5\u9650\u672C\u5730',
        footer: '\u00A9 2026 API Matrix. \u7248\u6B0A\u6240\u6709\u3002'
      }
    };

    let currentLang = localStorage.getItem('apiMatrixLang') || 'en';

    function applyLang(lang) {
      document.documentElement.lang = lang;
      const els = document.querySelectorAll('[data-i18n]');
      els.forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang] && i18n[lang][key] !== undefined) {
          el.innerHTML = i18n[lang][key];
        }
      });
      document.querySelectorAll('.lang-toggle button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      localStorage.setItem('apiMatrixLang', lang);
      currentLang = lang;
    }

    document.querySelectorAll('.lang-toggle button').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.dataset.lang));
    });

    applyLang(currentLang);
  </script>

</body>
</html>
