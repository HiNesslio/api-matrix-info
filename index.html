<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Matrix — Secure Key Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #06060e;
      --surface: rgba(255, 255, 255, 0.035);
      --surface-border: rgba(255, 255, 255, 0.07);
      --text-primary: #ededf5;
      --text-secondary: #8a8a9e;
      --accent-cyan: #00d4ff;
      --accent-emerald: #00ff94;
      --radius: 20px;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Animated grid background ── */
    .grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
      background-size: 40px 40px;
      animation: gridDrift 60s linear infinite;
    }
    @keyframes gridDrift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    /* ── Soft glow orbs ── */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .glow--cyan {
      width: 500px; height: 500px;
      background: rgba(0, 212, 255, 0.08);
      top: -200px; right: -150px;
      animation: floatGlow 12s ease-in-out infinite alternate;
    }
    .glow--emerald {
      width: 400px; height: 400px;
      background: rgba(0, 255, 148, 0.06);
      bottom: -150px; left: -100px;
      animation: floatGlow 16s ease-in-out infinite alternate-reverse;
    }
    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, -40px) scale(1.15); }
    }

    /* ── Noise texture ── */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── Main card ── */
    main {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 520px;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      padding: 56px 48px 48px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(24px);
      animation: cardIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), transparent 40%, transparent 60%, rgba(0, 255, 148, 0.15));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo mark ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.35s forwards;
    }
    .logo-diamond {
      width: 10px;
      height: 10px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-emerald));
      transform: rotate(45deg);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .logo-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Typography ── */
    h1 {
      font-family: var(--font-display);
      font-size: clamp(36px, 7vw, 52px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ededf5 0%, #a0a0c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.45s forwards;
    }
    h1 .highlight {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-emerald));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-emerald));
      border-radius: 2px;
      margin: 24px 0;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }

    .tagline {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
      max-width: 380px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.65s forwards;
    }

    /* ── Links ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.8s forwards;
    }
    .links a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      font-family: var(--font-body);
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
      overflow: hidden;
    }
    .links a::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(0, 255, 148, 0.04));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .links a:hover {
      border-color: rgba(0, 212, 255, 0.2);
      transform: translateY(-1px);
    }
    .links a:hover::before {
      opacity: 1;
    }
    .links a:active {
      transform: translateY(0);
    }
    .links a span {
      position: relative;
      z-index: 1;
    }
    .links a .arrow {
      position: relative;
      z-index: 1;
      font-size: 18px;
      color: var(--text-secondary);
      transition: transform 0.3s ease, color 0.3s ease;
    }
    .links a:hover .arrow {
      transform: translateX(4px);
      color: var(--accent-cyan);
    }

    /* ── Badge ── */
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.9s forwards;
    }
    .badge {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
    }
    .badge--accent {
      background: rgba(0, 212, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.15);
      color: var(--accent-cyan);
    }

    /* ── Footer ── */
    footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: rgba(138, 138, 158, 0.5);
      opacity: 0;
      animation: fadeUp 0.6s ease 1s forwards;
    }

    /* ── Responsive ── */
    @media (max-width: 540px) {
      .card { padding: 40px 28px 36px; }
      h1 { font-size: 32px; }
      .links a { padding: 14px 16px; font-size: 14px; }
    }
  </style>
</head>
<body>

  <div class="grid" aria-hidden="true"></div>
  <div class="glow glow--cyan" aria-hidden="true"></div>
  <div class="glow glow--emerald" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <main>
    <div class="card">
      <div class="logo">
        <div class="logo-diamond" aria-hidden="true"></div>
        <span class="logo-label">Secure Key Vault</span>
      </div>

      <h1>API <span class="highlight">Matrix</span></h1>

      <div class="divider" aria-hidden="true"></div>

      <p class="tagline">
        Centrally manage, test, and track all your AI provider API keys&nbsp;—<br>
        100% local storage, biometric-locked.
      </p>

      <nav class="links">
        <a href="privacy.html">
          <span>Privacy Policy</span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
        <a href="support.html">
          <span>Support &amp; FAQ</span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </nav>

      <div class="badge-row">
        <span class="badge badge--accent">🔒 Biometric Lock</span>
        <span class="badge">📱 iOS + Android</span>
        <span class="badge">🤖 20+ Providers</span>
        <span class="badge badge--accent">⚡ Local Only</span>
      </div>
    </div>

    <footer>
      &copy; 2026 API Matrix. All rights reserved.
    </footer>
  </main>

</body>
</html>
