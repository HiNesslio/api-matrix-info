<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="title">API Matrix — Secure Key Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #06060e;
      --surface: rgba(255, 255, 255, 0.035);
      --surface-border: rgba(255, 255, 255, 0.07);
      --text-primary: #ededf5;
      --text-secondary: #8a8a9e;
      --accent-cyan: #00d4ff;
      --accent-emerald: #00ff94;
      --radius: 20px;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    .grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
      background-size: 40px 40px;
      animation: gridDrift 60s linear infinite;
    }
    @keyframes gridDrift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .glow--cyan {
      width: 500px; height: 500px;
      background: rgba(0, 212, 255, 0.08);
      top: -200px; right: -150px;
      animation: floatGlow 12s ease-in-out infinite alternate;
    }
    .glow--emerald {
      width: 400px; height: 400px;
      background: rgba(0, 255, 148, 0.06);
      bottom: -150px; left: -100px;
      animation: floatGlow 16s ease-in-out infinite alternate-reverse;
    }
    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, -40px) scale(1.15); }
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    main {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 520px;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      padding: 56px 48px 48px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(24px);
      animation: cardIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), transparent 40%, transparent 60%, rgba(0, 255, 148, 0.15));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.35s forwards;
    }
    .logo-diamond {
      width: 10px;
      height: 10px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-emerald));
      transform: rotate(45deg);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .logo-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(36px, 7vw, 52px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ededf5 0%, #a0a0c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.45s forwards;
    }
    h1 .highlight {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-emerald));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-emerald));
      border-radius: 2px;
      margin: 24px 0;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }

    .tagline {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
      max-width: 420px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.65s forwards;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.8s forwards;
    }
    .links a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      font-family: var(--font-body);
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
      overflow: hidden;
    }
    .links a::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(0, 255, 148, 0.04));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .links a:hover {
      border-color: rgba(0, 212, 255, 0.2);
      transform: translateY(-1px);
    }
    .links a:hover::before {
      opacity: 1;
    }
    .links a:active {
      transform: translateY(0);
    }
    .links a span {
      position: relative;
      z-index: 1;
    }
    .links a .arrow {
      position: relative;
      z-index: 1;
      font-size: 18px;
      color: var(--text-secondary);
      transition: transform 0.3s ease, color 0.3s ease;
    }
    .links a:hover .arrow {
      transform: translateX(4px);
      color: var(--accent-cyan);
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.9s forwards;
    }
    .badge {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
    }
    .badge--accent {
      background: rgba(0, 212, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.15);
      color: var(--accent-cyan);
    }

    footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: rgba(138, 138, 158, 0.5);
      opacity: 0;
      animation: fadeUp 0.6s ease 1s forwards;
    }

    .lang-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 3px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }
    .lang-toggle button {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .lang-toggle button.active {
      background: rgba(0, 212, 255, 0.15);
      color: var(--accent-cyan);
    }
    .lang-toggle button:not(.active):hover {
      color: var(--text-primary);
    }

    @media (max-width: 540px) {
      .card { padding: 40px 28px 36px; }
      h1 { font-size: 32px; }
      .links a { padding: 14px 16px; font-size: 14px; }
      .lang-toggle { top: 12px; right: 12px; }
    }
  </style>
</head>
<body>

  <div class="grid" aria-hidden="true"></div>
  <div class="glow glow--cyan" aria-hidden="true"></div>
  <div class="glow glow--emerald" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <div class="lang-toggle" role="group" aria-label="Language switch">
    <button data-lang="en" class="active" aria-label="English">EN</button>
    <button data-lang="zh" aria-label="中文">中</button>
  </div>

  <main>
    <div class="card">
      <div class="logo">
        <div class="logo-diamond" aria-hidden="true"></div>
        <span class="logo-label" data-i18n="logoLabel">SECURE KEY VAULT</span>
      </div>

      <h1>API <span class="highlight">Matrix</span></h1>

      <div class="divider" aria-hidden="true"></div>

      <p class="tagline" data-i18n="tagline">
        Centrally manage, test, and track all your AI provider API keys&nbsp;—<br>
        100% local storage, biometric-locked.
      </p>

      <nav class="links">
        <a href="privacy.html">
          <span data-i18n="linkPrivacy">Privacy Policy</span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
        <a href="support.html">
          <span data-i18n="linkSupport">Support &amp; FAQ</span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </nav>

      <div class="badge-row">
        <span class="badge badge--accent" data-i18n="badgeBiometric">🔒 Biometric Lock</span>
        <span class="badge" data-i18n="badgePlatforms">📱 iOS + Android</span>
        <span class="badge" data-i18n="badgeProviders">🤖 20+ Providers</span>
        <span class="badge badge--accent" data-i18n="badgeLocal">⚡ Local Only</span>
      </div>
    </div>

    <footer>
      <span data-i18n="footer">&copy; 2026 API Matrix. All rights reserved.</span>
    </footer>
  </main>

  <script>
    const i18n = {
      en: {
        title: 'API Matrix — Secure Key Vault',
        logoLabel: 'SECURE KEY VAULT',
        tagline: 'Centrally manage, test, and track all your AI provider API keys&nbsp;—<br>100% local storage, biometric-locked.',
        linkPrivacy: 'Privacy Policy',
        linkSupport: 'Support &amp; FAQ',
        badgeBiometric: '\u{1F512} Biometric Lock',
        badgePlatforms: '\u{1F4F1} iOS + Android',
        badgeProviders: '\u{1F916} 20+ Providers',
        badgeLocal: '\u26A1 Local Only',
        footer: '\u00A9 2026 API Matrix. All rights reserved.'
      },
      zh: {
        title: 'API Matrix — 安全金鑰保管庫',
        logoLabel: '安全金鑰保管庫',
        tagline: '集中管理、測試和追蹤所有 AI 供應商的 API 金鑰&nbsp;—<br>100% 本地儲存，生物辨識鎖定。',
        linkPrivacy: '隱私權政策',
        linkSupport: '支援與常見問題',
        badgeBiometric: '\u{1F512} 生物辨識鎖定',
        badgePlatforms: '\u{1F4F1} iOS + Android',
        badgeProviders: '\u{1F916} 20+ 供應商',
        badgeLocal: '\u26A1 僅限本地',
        footer: '\u00A9 2026 API Matrix. 版權所有。'
      }
    };

    let currentLang = localStorage.getItem('apiMatrixLang') || 'en';

    function applyLang(lang) {
      document.documentElement.lang = lang;
      const els = document.querySelectorAll('[data-i18n]');
      els.forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang] && i18n[lang][key] !== undefined) {
          el.innerHTML = i18n[lang][key];
        }
      });
      document.querySelectorAll('.lang-toggle button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      localStorage.setItem('apiMatrixLang', lang);
      currentLang = lang;
    }

    document.querySelectorAll('.lang-toggle button').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.dataset.lang));
    });

    applyLang(currentLang);
  </script>

</body>
</html>
